<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBank - Registrati</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="maincontainer">
            <header class="navbar">
            <div class="nbcontainer">
                <div class="logo">
                <img src="../assets/logo lungo7.png" alt="logo Unibank">
                </div>
                <div class="menu">
                    <ul>
                        <li>
                            <a href="../index.html">Home</a>
                        </li>
                    </ul>
                </div>
            </div>
        </header>
        <div class="container">
            <div class="loginbox">
                <div class="loginheader">
                    <div class="logo2">
                        <img src="../assets/logo.png" alt="logo Unibank">
                    </div>
                    <h2>Crea il tuo account</h2>
                    <p>Inizia a condividere e acquistare dispense</p>
                </div>
                <form action="signup.php" method="POST">
                    <div class="formgrid">
                        <div class="inputbox">
                            <label for="username">Username</label>
                            <input type="text" name="username" placeholder="Username" required>
                        </div>
                        <div class="inputbox">
                            <label for="emailuniversitaria">Email Universitaria</label>
                            <input type="email" name="email" placeholder="nome@università.it" required>
                        </div>
                        <div class="inputbox">
                            <label for="password">Password</label>
                            <input type="password" name="password" placeholder="●●●●●●" required>
                        </div>
                        <div class="inputbox">
                            <label for="confermapassword">Conferma Password</label>
                            <input type="password" name="confermapassword" placeholder="●●●●●●" required>
                        </div>
                        <div class="inputbox fullwidth">
                            <label for="universita">Università</label>
                            <select name="universita" required>
                                <option value="">Seleziona università</option>
                                <option value="milano">Università di Milano</option>
                                <option value="roma">Università di Roma</option>
                                <option value="bologna">Università di Bologna</option>
                            </select>
                        </div>
                        <div class="inputbox fullwidth">
                            <label for="facolta">Facoltà</label>
                            <select name="facolta" required>
                                <option value="">Seleziona facoltà</option>
                                <option value="ingegneria">Ingegneria</option>
                                <option value="economia">Economia</option>
                                <option value="giurisprudenza">Giurisprudenza</option>
                            </select>
                        </div>
                    </div>


                    <button class="loginbtn" type="submit">Registrati</button>
                    <p class="donthaveaccount">Hai già un account? <a href="login.html">Accedi</a></p>
                </form>
            </div>
        </div>
    </div>
    
</body>
</html>
